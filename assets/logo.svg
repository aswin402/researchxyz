<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Neon Teal Glow Filter -->
    <filter id="neon-glow-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Background Radial Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#171c28" />
      <stop offset="100%" stop-color="#0b0e14" />
    </radialGradient>

    <!-- Linear Gradient for Text accent -->
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3c0" />
      <stop offset="100%" stop-color="#5fb88a" />
    </linearGradient>
  </defs>

  <style>
    <![CDATA[
    /* Neon Glow and Pulse Keyframes */
    @keyframes neon-pulse {
      0%, 100% {
        opacity: 0.85;
        filter: drop-shadow(0 0 3px #7dd3c0) drop-shadow(0 0 8px #7dd3c0);
      }
      50% {
        opacity: 1.0;
        filter: drop-shadow(0 0 6px #7dd3c0) drop-shadow(0 0 18px #7dd3c0);
      }
    }

    /* Terminal Cursor Blinking */
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Magnifying Glass Scan Motion */
    @keyframes lens-scan {
      0%, 100% { transform: translate(0px, 0px); }
      50% { transform: translate(6px, -6px); }
    }

    /* Code Line Typing Animation Simulated */
    @keyframes code-type {
      0%, 100% { stroke-dashoffset: 80; }
      50% { stroke-dashoffset: 0; }
    }

    /* Class applications */
    .bg {
      fill: url(#bg-grad);
    }
    .neon-pulse-element {
      animation: neon-pulse 3s infinite ease-in-out;
    }
    .scanner-group {
      animation: lens-scan 5s infinite ease-in-out;
    }
    .cursor-blink-element {
      animation: cursor-blink 1s infinite steps(1);
    }
    .typing-line-1 {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: code-type 4s infinite ease-in-out;
    }
    .typing-line-2 {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: code-type 4s infinite ease-in-out;
      animation-delay: 1s;
    }
    ]]>
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" rx="24" />

  <!-- Logo Graphics Group -->
  <g transform="translate(0, -10)">
    
    <!-- Stack of Books (Background Elements) -->
    <g stroke="#262a36" stroke-width="4" fill="none" opacity="0.6" transform="translate(0, 10)">
      <!-- Book 1 (Top) -->
      <path d="M 170 140 h 160 a 8 8 0 0 1 8 8 v 12 a 8 8 0 0 1 -8 8 h -160 a 8 8 0 0 1 -8 -8 v -12 a 8 8 0 0 1 8 -8 z" />
      <line x1="185" y1="140" x2="185" y2="168" />
      
      <!-- Book 2 (Middle) -->
      <path d="M 170 178 h 160 a 8 8 0 0 1 8 8 v 12 a 8 8 0 0 1 -8 8 h -160 a 8 8 0 0 1 -8 -8 v -12 a 8 8 0 0 1 8 -8 z" />
      <line x1="185" y1="178" x2="185" y2="206" />

      <!-- Book 3 (Bottom) -->
      <path d="M 170 216 h 160 a 8 8 0 0 1 8 8 v 12 a 8 8 0 0 1 -8 8 h -160 a 8 8 0 0 1 -8 -8 v -12 a 8 8 0 0 1 8 -8 z" />
      <line x1="185" y1="216" x2="185" y2="244" />
    </g>

    <!-- Scanner / Magnifying Glass Group (Animated Float) -->
    <g class="scanner-group">
      <!-- Outer Glass Lens (Teal Neon) -->
      <circle cx="260" cy="200" r="76" stroke="#7dd3c0" stroke-width="7" fill="#11141c" fill-opacity="0.85" filter="url(#neon-glow-filter)" class="neon-pulse-element" />
      
      <!-- Handle (Diagonal) -->
      <line x1="314" y1="254" x2="370" y2="310" stroke="#7dd3c0" stroke-width="12" stroke-linecap="round" filter="url(#neon-glow-filter)" class="neon-pulse-element" />
      
      <!-- Inner Terminal Code Lines inside the lens -->
      <g stroke="#7dd3c0" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9">
        <!-- Terminal prompt prompt '>' -->
        <path d="M 215 178 l 6 4 l -6 4" stroke-width="3" />
        
        <!-- Code line 1 -->
        <line x1="229" y1="182" x2="295" y2="182" class="typing-line-1" />
        
        <!-- Code line 2 -->
        <line x1="215" y1="200" x2="280" y2="200" class="typing-line-2" />
        
        <!-- Prompt 2 '>' -->
        <path d="M 215 218 l 6 4 l -6 4" stroke-width="3" />
        
        <!-- Cursor line block '_' -->
        <line x1="228" y1="222" x2="238" y2="222" stroke-width="5" class="cursor-blink-element" />
      </g>
    </g>
  </g>

  <!-- Typography Section -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <!-- Brand Title -->
    <text x="256" y="398" font-size="44" font-weight="800" fill="#d4d4d6" letter-spacing="1">
      research<tspan fill="url(#teal-grad)">xyz</tspan>
    </text>
    
    <!-- Subtitle / Tagline -->
    <text x="256" y="432" font-size="12" font-weight="600" fill="#6b7280" letter-spacing="4">
      TERMINAL-NATIVE AI RESEARCH AGENT
    </text>
  </g>
</svg>